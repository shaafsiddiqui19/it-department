<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Vehicle Speed Detection</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  </head>
  <body>
    <header class="bg-primary text-white p-3">
      <div class="container d-flex align-items-center">
        <h4 class="me-auto mb-0">🚦 Automated Traffic Monitoring Framework For Vehicle Speed Detection Using Python And Open CV</h4>
        <nav>
          <a class="text-white me-3" href="{{ url_for('index') }}">Home</a>
          <a class="text-white me-3" href="{{ url_for('upload') }}">Upload Video</a>
        </nav>
      </div>
    </header>

    <div class="container my-4">
      {% with messages = get_flashed_messages() %}
        {% if messages %}
          <div class="alert alert-warning">
            {{ messages[0] }}
          </div>
        {% endif %}
      {% endwith %}
      {% block content %}{% endblock %}
    </div>

    <footer class="bg-light text-muted text-center py-3 mt-5">
      <!--<small>Built with OpenCV &amp; dlib • Adjust <code>myhaar.xml</code> and ppm for accuracy</small>-->
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
